<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Data Browser — M1 dev page</title>
  <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@400;500;600;700&family=Saira:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dev.css" />
</head>
<body>
  <header class="hdr">
    <h1>World Data Browser</h1>
    <p class="sub">M1 verification page — every league → club with a procedurally generated crest, plus nations, cups and name pools. Data loaded live from <code>data/*.json</code>.</p>
  </header>

  <section id="counts" class="counts"></section>

  <nav class="tabs" id="tabs">
    <button class="tab is-active" data-tab="clubs">Leagues &amp; Clubs</button>
    <button class="tab" data-tab="nations">Nations</button>
    <button class="tab" data-tab="cups">Cups &amp; Tournaments</button>
    <button class="tab" data-tab="names">Name Pools</button>
  </nav>

  <main>
    <section id="panel-clubs" class="panel is-active"></section>
    <section id="panel-nations" class="panel"></section>
    <section id="panel-cups" class="panel"></section>
    <section id="panel-names" class="panel"></section>
  </main>

  <script type="module" src="world.js"></script>
</body>
</html>
